<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reset Password - Technovator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="app.js" defer></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="note">
    <div><strong>Reset Password</strong></div>
  </div>

  <!-- ID is reset-box to prevent app.js from auto-hiding it when logged in -->
  <div class="auth-box" id="reset-box">
    <input type="password" id="new-password" placeholder="New Password" />
    <input type="password" id="confirm-password" placeholder="Confirm Password" />
    <button id="update-password-btn" class="btn">Update Password</button>
  </div>
</body>
</html>
