<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Technovator AR/VR Model Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <script src="https://cdn.babylonjs.com/babylon.js" defer></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="app.js" defer></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="note">
    <div><strong>Technovator AR/VR Model Viewer</strong></div>
    <div class="muted">Login to upload and view your 3D models.</div>
    <div class="row">
      <div id="xr-wrapper" style="display:inline-block" title="Feature only available on WebXR devices (Mobile/VR)">
        <button id="enter-xr" class="btn" disabled style="pointer-events:none">Enter WebXR</button>
      </div>
      <select id="model-select" class="btn">
        <option disabled selected value="">SELECT A MODEL</option>
      </select>
      <button id="upload-model" class="btn" disabled>+</button>
      <button id="settings-btn" class="btn" disabled><img src="assets/settingsicon.png" alt="settings" /></button>
      <button id="logout-btn" class="btn" style="display:none;">Logout</button>
    </div>
  </div>

  <div class="auth-box" id="auth-box">
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="login-btn" class="btn">Login</button>
    <button class="btn" onclick="window.location.href='register.html'">Register</button>
    <button id="forgot-password-btn" class="btn" style="background: transparent; border: none; font-size: 12px; text-decoration: underline; margin-top: 5px; width: 100%;">Forgot Password?</button>
  </div>

  <div id="xr-mode-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3 style="margin-top:0;">Select XR Mode</h3>
      <p style="color:#aaa; font-size:14px; margin-bottom:15px;">Choose your preferred viewing experience.</p>
      <div class="row" style="justify-content:center;">
        <button id="btn-choose-vr" class="btn">Virtual Reality (VR)</button>
        <button id="btn-choose-ar" class="btn">Augmented Reality (AR)</button>
      </div>
    </div>
  </div>

  <div class="xr-info" id="xr-info">
    <div id="xr-info-text">Tap to place model</div>
  </div>

  <div class="placement-guide" id="placement-guide"></div>

  <canvas id="renderCanvas"></canvas>
</body>
</html>
